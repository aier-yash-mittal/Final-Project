server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - JwtAuthenticationFilter
            
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/items/**
          filters:
            - JwtAuthenticationFilter
            
        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/requests/**
          filters:
            - JwtAuthenticationFilter

