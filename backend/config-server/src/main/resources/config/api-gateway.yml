server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"               #methods like GET, POST, PUT, DELETE, etc. are allowed
            allowedHeaders: "*"               #headers like Content-Type, Authorization, etc. are allowed
      routes:
        - id: auth-service
          uri: lb://auth-service  #locates the auth-service using Eureka Service Discovery
          predicates:  
            - Path=/auth/**
          filters:
            - JwtAuthenticationFilter
            
        - id: inventory-service
          uri: lb://inventory-service  
          predicates:                  #predicateds define the routing rules based on the request path
            - Path=/items/**
          filters:                     #filter define the actions to be taken on the request before forwarding it to the destination service
            - JwtAuthenticationFilter
            
        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/requests/**
          filters:
            - JwtAuthenticationFilter

