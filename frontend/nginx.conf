server {
    listen 80;
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    location = /index.html {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }
}
# nginx.conf file is used to configure Nginx to serve the React frontend application. The configuration specifies that Nginx should listen on port 80 and serve files from the /usr/share/nginx/html directory. 
# The try_files directive is used to ensure that React Router based routes such as /admin and /student correctly load index.html instead of returning 404 errors on page refresh. Additionally, caching headers are set for index.html to prevent caching issues during development.