version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: stationery-mysql
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/sql-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 5

  eureka-server:
    build: ../backend/eureka-server
    container_name: eureka-server
    restart: on-failure
    ports:
      - "8761:8761"

  config-server:
    build: ../backend/config-server
    container_name: config-server
    restart: on-failure
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server

  api-gateway:
    build: ../backend/api-gateway
    container_name: api-gateway
    restart: on-failure
    ports:
      - "9090:8080"
    depends_on:
      - config-server
      - eureka-server

  auth-service:
    build: ../backend/auth-service
    container_name: auth-service
    restart: on-failure
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started

  inventory-service:
    build: ../backend/inventory-service
    container_name: inventory-service
    restart: on-failure
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started

  request-service:
    build: ../backend/request-service
    container_name: request-service
    restart: on-failure
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started

  frontend:
    build: ../frontend
    container_name: react-frontend
    restart: on-failure
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  mysql_data: